# yaml-language-server: $schema=./schemas/fire.schema.json
dir: . # default working directory "."

namespace:
  description: Example

  prefix: ex

group: backend
description: Backend related commands

runtimes:
  ts:
    sdk: deno
    runner: deno
    check: deno --version
    fallback_runner: docker run --rm -it denoland/deno:latest
    paths:
      - scripts/*.ts
      - scripts/helpers/*.ts

  js:
    sdk: node
    runner: node
    check: node -v
    fallback_runner: docker run --rm -it node:lts-alpine
    paths:
      - scripts/*.mjs

  py:
    sdk: python
    runner: python3.13
    paths:
      - scripts/*.py

include:
  - samples/

x-arg-config: &arg-config
  # Define the placeholder pattern once. Only this pattern is honored—no implicit defaults.
  # {{n}} -> {1}, {2}, ... ; @{n} -> @1, @2, ... ; spreads become ...<placeholder> and [<placeholder>].
  # The ...<placeholder> and [<placeholder>] forms must stay literal; they expand to arrays (string[]).
  placeholder: "{{n}}"
  on_unused_args: ignore # default is error; ignore skips, warn logs, error fails

# Example: running `fire hello other args` executes `echo hello world other args...`
commands:
  hello: echo hello world

  pwd: pwd

  double:
    commands:
      hello:
        description: "say twice"
        placeholder: "{{n}}"
        exec:
          - echo hello world
          - echo again {1}
      world:
        description: "say world twice"
        exec:
          - echo world
          - echo world

  npm:
    dir: . # default (relative to project root)
    check: npm -v # if this fails, fallback_runner will be used
    fallback_runner: docker run --rm -it node:lts-alpine sh # fallback
    exec: npm

  docker-node:
    exec: docker run --rm -it node:lts-alpine sh

  run:
    description: |
      y si agrego descripción a este?
      vamos
    exec: npm run

  run2:
    before: docker compose ps -q front | grep -q . || docker compose up -d front
    exec: compose exec front npm run

  run3:
    runner: docker compose exec front /bin/bash # equivalent to run inside the container
    exec: # multiple commands run in sequence; the last one receives the args
      - npm run build
      - npm run start

  # fire run5 -> npm run
  # fire run5 build -> npm run clean && npm run build
  # fire run5 other -> npm run other
  run5:
    exec: npm run # if it matches subcommands, it will be ignored
    commands:
      build: npm run clean && npm run build
      start: fire build && npm run start

  up:
    <<: *arg-config
    compute:
      .hash: ts:makeHash("{1}", "sha256")
    description: "<name> <job>"
    exec: echo "Hello {1}, your job is {2}, hash=.hash"

  computed:
    <<: *arg-config
    eval: py:sayHello("{1}", "{2}", ...{{n}})

  computed2:
    <<: *arg-config
    eval: ts:makeHash("{1}", "sha256")

  computed3:
    <<: *arg-config
    eval: js:getCurrentTimestamp()

  vars:
    <<: *arg-config
    compute:
      "{service}": ts:getServiceNameById("{1}")
    macros:
      "{{front}}": docker compose exec front
      "{{dynamic}}": docker compose exec {service}
    exec: "{{front}} npm run"
    commands:
      npm-version: "{{front}} npm -v"
      node-version: "{{front}} node -v"
      hello: "{{dynamic}} echo Hello"
      hey:
        exec: npm run # if it matches subcommands, it will be ignored
        commands:
          build: npm run clean && npm run build
          hey:
            description: "say hey!!!"
            exec: npm run
          start: fire build && npm run start

  fallback:
    check: exit -1
    before: echo "ignore me please"
    fallback_runner: docker run --rm -it -v .:/mount alpine sh
    exec:
      - cd mount
      - pwd
      - ls
      - cat README.md

  alpine:
    runner: docker compose exec linux sh
    before: docker compose ps -q linux | grep -q . || docker compose up -d linux
    exec:
      - echo "This is running inside the alpine container!"
      - pwd

  alpine2:
    before: docker compose ps -q linux | grep -q . || docker compose up -d linux
    exec:
      docker compose exec linux pwd

  container:
    runner: docker run --rm -it -v .:/mount alpine sh
    exec:
      - cd /mount
      - pwd
      - ls

  template:
    macros:
      "CMD": docker compose exec linux
    <<: *arg-config
    exec:
      - "CMD echo Hello {1}, are you from {2}?"
      - "CMD echo {2} is a beautiful place!"
      - "CMD echo and who else is with you? ...{{n}}"
      - "CMD echo and who else is with you? [{{n}}]"

  list-args:
    placeholder: "@{n}"
    exec: "echo argument 1: @1, argument @2"

  echo-eval:
    description: "Example of eval that returns a string to be executed"
    eval: ts:getEcho()

  echo:
    exec:
      - cd schemas
      - pwd
      - ls

  docker:
    runner: docker exec -it magoo_database_1 bash
    exec: mysql -u laravel -D laravel -p

  tty:
    <<: *arg-config
    compute:
      $name: "echo {1}"
    exec:
      - echo "hello" $name
      - read -p "Press enter to continue..."
      - echo "goodbye"

